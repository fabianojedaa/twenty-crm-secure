version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: twenty-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: twenty2026
      POSTGRES_DB: twenty
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d twenty -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: twenty-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # Twenty CRM Server
  twenty-server:
    image: twentycrm/twenty:latest
    container_name: twenty-server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    environment:
      # Core URLs - accessed through nginx proxy
      SERVER_URL: http://localhost:8080
      FRONT_BASE_URL: http://localhost:8080
      
      # Database
      PG_DATABASE_URL: postgresql://postgres:twenty2026@postgres:5432/twenty
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # Auth secrets
      ACCESS_TOKEN_SECRET: twenty-access-secret-codespaces-2026
      LOGIN_TOKEN_SECRET: twenty-login-secret-codespaces-2026
      REFRESH_TOKEN_SECRET: twenty-refresh-secret-codespaces-2026
      FILE_TOKEN_SECRET: twenty-file-secret-codespaces-2026
      
      # Storage
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/packages/twenty-server/.local-storage
      
      # Disable telemetry
      TELEMETRY_ENABLED: false
      
    volumes:
      - twenty_storage:/app/packages/twenty-server/.local-storage

  # Twenty Frontend
  twenty-front:
    image: twentycrm/twenty-front:latest
    container_name: twenty-front
    depends_on:
      - twenty-server
    restart: unless-stopped
    environment:
      REACT_APP_SERVER_BASE_URL: http://localhost:8080

  # Nginx Proxy with Password Protection
  nginx-proxy:
    image: nginx:alpine
    container_name: twenty-nginx
    depends_on:
      - twenty-front
      - twenty-server
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./auth/.htpasswd:/etc/nginx/.htpasswd:ro
    command: ["/bin/sh", "-c", "nginx -g 'daemon off;'"]

volumes:
  postgres_data:
  twenty_storage: