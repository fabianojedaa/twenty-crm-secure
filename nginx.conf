events {
    worker_connections 1024;
}

http {
    upstream twenty-frontend {
        server twenty-front:3000;
    }
    
    upstream twenty-backend {
        server twenty-server:3000;
    }

    server {
        listen 80;
        server_name _;

        # Password protection for the entire site
        auth_basic "Twenty CRM - VirtuaLending Access";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # Frontend (main UI)
        location / {
            proxy_pass http://twenty-frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Backend API
        location /graphql {
            proxy_pass http://twenty-backend/graphql;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /auth {
            proxy_pass http://twenty-backend/auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api {
            proxy_pass http://twenty-backend/api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}